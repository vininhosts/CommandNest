name: Cross-Platform Desktop

on:
  push:
    branches: [main]
  pull_request:

jobs:
  package:
    name: Package ${{ matrix.label }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - label: Windows
            os: windows-latest
            script: package:windows
          - label: Linux
            os: ubuntu-latest
            script: package:linux
    defaults:
      run:
        working-directory: CrossPlatform
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: CrossPlatform/package-lock.json

      - name: Install
        run: npm ci

      - name: Syntax check
        run: |
          node --check src/main.js
          node --check src/preload.js
          node --check src/renderer/app.js

      - name: Package
        run: npm run ${{ matrix.script }}

      - name: Archive Linux bundles
        if: runner.os == 'Linux'
        run: |
          tar -czf dist/CommandNest-linux-x64.tar.gz -C dist CommandNest-linux-x64
          tar -czf dist/CommandNest-linux-arm64.tar.gz -C dist CommandNest-linux-arm64

      - name: Archive Windows bundles
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          Compress-Archive -Path dist/CommandNest-win32-x64 -DestinationPath dist/CommandNest-win32-x64.zip -Force
          Compress-Archive -Path dist/CommandNest-win32-arm64 -DestinationPath dist/CommandNest-win32-arm64.zip -Force

      - name: Upload artifacts
        uses: actions/upload-artifact@v7
        with:
          name: commandnest-${{ matrix.label }}
          path: |
            CrossPlatform/dist/*.zip
            CrossPlatform/dist/*.tar.gz
