name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  package:
    name: Package macOS App
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Package
        run: Scripts/package_release.sh

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if gh release view "${GITHUB_REF_NAME}" >/dev/null 2>&1; then
            gh release upload "${GITHUB_REF_NAME}" \
              dist/CommandNest-*.zip \
              dist/CommandNest-*.sha256 \
              --clobber
          else
            gh release create "${GITHUB_REF_NAME}" \
              dist/CommandNest-*.zip \
              dist/CommandNest-*.sha256 \
              --title "CommandNest ${GITHUB_REF_NAME}" \
              --notes-file RELEASE_NOTES.md
          fi

  package-cross-platform:
    name: Package ${{ matrix.label }} App
    needs: package
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - label: Windows
            os: windows-latest
            script: package:windows
          - label: Linux
            os: ubuntu-latest
            script: package:linux
    defaults:
      run:
        working-directory: CrossPlatform
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: CrossPlatform/package-lock.json

      - name: Install
        run: npm ci

      - name: Package
        run: npm run ${{ matrix.script }}

      - name: Archive Linux bundles
        if: runner.os == 'Linux'
        run: |
          tar -czf dist/CommandNest-linux-x64.tar.gz -C dist CommandNest-linux-x64
          tar -czf dist/CommandNest-linux-arm64.tar.gz -C dist CommandNest-linux-arm64

      - name: Archive Windows bundles
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          Compress-Archive -Path dist/CommandNest-win32-x64 -DestinationPath dist/CommandNest-win32-x64.zip -Force
          Compress-Archive -Path dist/CommandNest-win32-arm64 -DestinationPath dist/CommandNest-win32-arm64.zip -Force

      - name: Upload to GitHub Release
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          files=()
          while IFS= read -r -d '' file; do
            files+=("$file")
          done < <(find dist -maxdepth 1 \( -name '*.zip' -o -name '*.tar.gz' \) -print0)
          gh release upload "${GITHUB_REF_NAME}" "${files[@]}" --clobber
