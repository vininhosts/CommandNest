name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build-test:
    name: Build and Test
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Show Xcode
        run: xcodebuild -version

      - name: Lint project files
        run: |
          plutil -lint CommandNest.xcodeproj/project.pbxproj CommandNest/Info.plist CommandNest/CommandNest.entitlements
          xmllint --noout CommandNest.xcodeproj/xcshareddata/xcschemes/CommandNest.xcscheme

      - name: Test
        run: |
          xcodebuild \
            -project CommandNest.xcodeproj \
            -scheme CommandNest \
            -configuration Debug \
            -destination 'platform=macOS' \
            test

      - name: Build Release
        run: |
          xcodebuild \
            -project CommandNest.xcodeproj \
            -scheme CommandNest \
            -configuration Release \
            -destination 'generic/platform=macOS' \
            build
